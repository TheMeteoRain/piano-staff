server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;
    root   /usr/share/nginx/html;
    index  index.html;

    #access_log  /var/log/nginx/host.access.log  main;

    # all assets contain hash in filename, cache forever
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, s-maxage=31536000, immutable";
        try_files $uri =404;
    }

    # Digital Asset Links must be served as application/json and must NOT fall
    # back to the SPA (index.html), or TWA domain verification fails.
    location = /.well-known/assetlinks.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=0, s-maxage=0, must-revalidate" always;
        try_files $uri =404;
    }

    # Content-Type is set by the mime map / default_type, NOT add_header. The
    # empty `types {}` clears the mapping for this location so default_type wins
    # even for the .json extension (which mime.types would otherwise serve as
    # application/json). Revalidate so a new release's manifest is picked up.
    #
    # vite-plugin-pwa generates manifest.webmanifest (its default name); the
    # manifest.json URL is mirrored from that same file so both remain valid.
    location = /manifest.webmanifest {
        types { }
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=0, s-maxage=0, must-revalidate" always;
        try_files $uri =404;
    }

    location = /manifest.json {
        types { }
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=0, s-maxage=0, must-revalidate" always;
        try_files /manifest.webmanifest =404;
    }

    location / {
        add_header Cache-Control "public, max-age=0, s-maxage=0, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # proxy the PHP scripts to Apache listening on 127.0.0.1:80
    #
    #location ~ \.php$ {
    #    proxy_pass   http://127.0.0.1;
    #}

    # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
    #
    #location ~ \.php$ {
    #    root           html;
    #    fastcgi_pass   127.0.0.1:9000;
    #    fastcgi_index  index.php;
    #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
    #    include        fastcgi_params;
    #}

    # deny access to .htaccess files, if Apache's document root
    # concurs with nginx's one
    #
    #location ~ /\.ht {
    #    deny  all;
    #}
}
