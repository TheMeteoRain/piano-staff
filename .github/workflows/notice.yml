name: Update NOTICE

# Whenever the dependency tree changes on main (the lockfile is the precise
# signal), regenerate the third-party attribution table and commit it back.
on:
  push:
    branches:
      - main
    paths:
      - pnpm-lock.yaml

permissions:
  contents: write

jobs:
  notice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/asdf-setup
      - uses: ./.github/actions/pnpm

      - name: Regenerate and commit NOTICE.md
        run: |
          pnpm notice
          if git diff --quiet public/NOTICE.md; then
            echo "NOTICE.md already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/NOTICE.md
            git commit -m "chore: update NOTICE.md for dependency changes"
            git push
          fi
